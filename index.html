// Skeletal/framework drawings often omit explicit hydrogens.
// You asked to show the "H" balls for glucose/sucrose, so we keep a toggle.
// Press the "H" key to toggle hydrogen visibility.
function normalizeFormulaKey(formula){
    const subMap = { '₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9' };
    return String(formula)
        .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, ch => subMap[ch] ?? ch)
        .replace(/\s+/g,'')
        .replace(/[\u00B7·]/g,''); // remove dot hydrates for key
}

// Return a molecule preset (2D) if known; else null.
// Output: { atoms:[{symbol, dx, dy, role}], bonds:[[a,b,type]] }
// dx/dy are in "units" multiplied by (atomSize*0.95)

// Build a simplified sucrose (C12H22O11) 2D schematic:
// - Left: glucose (pyranose ring) ; Right: fructose (furanose ring)
// - One glycosidic oxygen bridge between the rings
// This is a teaching/visual layout (not stereochemically exact), but connectivity and stoichiometry match C12H22O11.
function buildSucrosePreset(){
    // Skeletal / framework-style 2D Haworth-like layout (teaching diagram)
    // Visible atoms: 12 C + 11 O (no explicit H balls). The remaining 22 H are implicit/hidden.
    const atoms = [];
    const bonds = [];
    const add = (symbol, dx, dy, hidden=false) => (atoms.push({symbol, dx, dy, hidden}), atoms.length - 1);

    // ---------- Left ring: glucose pyranose (6-member, one O + 5C) ----------
    // Approximate chair-ish projection (like typical textbook)
    const L = {};
    L.C1 = add("C", -3.0,  0.6);
    L.C2 = add("C", -2.0,  1.3);
    L.C3 = add("C", -1.0,  0.8);
    L.C4 = add("C", -1.2, -0.4);
    L.C5 = add("C", -2.3, -0.9);
    L.O5 = add("O", -3.2, -0.3);

    bonds.push([L.C1,L.C2,"single"],[L.C2,L.C3,"single"],[L.C3,L.C4,"single"],[L.C4,L.C5,"single"],[L.C5,L.O5,"single"],[L.O5,L.C1,"single"]);

    // Exocyclic C6 (CH2OH) up-left
    L.C6 = add("C", -2.4,  2.4);
    bonds.push([L.C2, L.C6, "single"]); // attach near C2/upper edge for visual CH2OH

    // ---------- Right ring: fructose furanose (5-member, one O + 4C) ----------
    const R = {};
    R.C2 = add("C",  1.6,  0.7);  // anomeric carbon (links to bridge O)
    R.C3 = add("C",  2.6,  1.3);
    R.C4 = add("C",  3.5,  0.6);
    R.C5 = add("C",  2.9, -0.6);
    R.O5 = add("O",  1.9, -0.2);

    bonds.push([R.C2,R.C3,"single"],[R.C3,R.C4,"single"],[R.C4,R.C5,"single"],[R.C5,R.O5,"single"],[R.O5,R.C2,"single"]);

    // Fructose has two CH2OH groups (C1' and C6')
    R.C1 = add("C",  0.8,  1.6);
    bonds.push([R.C2, R.C1, "single"]);
    R.C6 = add("C",  3.9, -1.6);
    bonds.push([R.C5, R.C6, "single"]);

    // ---------- Glycosidic bridge oxygen between L.C1 and R.C2 ----------
    const Obridge = add("O", -0.7,  0.2);
    bonds.push([L.C1, Obridge, "single"], [Obridge, R.C2, "single"]);

    // ---------- Hydroxyl oxygens (8 O) on rings / side chains ----------
    // We draw only the O in OH (framework style). H are implicit.
    const addOH_O = (cIdx, ox, oy) => {
        const o = add("O", ox, oy);
        bonds.push([cIdx, o, "single"]);
    };

    // glucose OH (rough positions)
    addOH_O(L.C1, -3.9,  1.2);
    addOH_O(L.C3, -0.2,  1.2);
    addOH_O(L.C4, -0.4, -1.1);
    addOH_O(L.C5, -2.2, -2.1);
    addOH_O(L.C6, -3.5,  3.0);

    // fructose OH (rough positions)
    addOH_O(R.C3,  2.2,  2.4);
    addOH_O(R.C4,  4.6,  0.9);
    addOH_O(R.C6,  5.1, -2.0);

        return { atoms, bonds };
}

// --- Expand skeleton presets to explicit-H presets (no hiding). ---
function parseFormulaCounts(formula){
    // Accept subscripts like H₂O -> convert to plain digits already in data.n for this project, but be safe.
    const subMap = {'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9'};
    const f = (formula||"").replace(/[₀-₉]/g, m=>subMap[m]||m);
    const counts = {};
    const reEl = /([A-Z][a-z]?)(\d*)/g;
    let m;
    while((m=reEl.exec(f))){
        const el=m[1];
        const n=m[2]?parseInt(m[2],10):1;
        counts[el]=(counts[el]||0)+n;
    }
    return counts;
}
function bondOrder(type){
    if(type==="double") return 2;
    if(type==="triple") return 3;
    return 1; // single / ionic / default
}
function typicalValence(sym){
    switch(sym){
        case "C": return 4;
        case "N": return 3;
        case "O": return 2;
        case "H": return 1;
        case "Cl": return 1;
        case "Na": return 1;
        case "K": return 1;
        case "Ca": return 2;
        case "S": return 6; // for H2SO4 etc. (we won't over-hydrogenate if already satisfied)
        default: return 4;
    }
}
function addExplicitHydrogensToMatch(atoms, bonds, formulaCounts){
    const targetH = (formulaCounts && formulaCounts.H) ? formulaCounts.H : 0;
    if(targetH<=0) return {atoms,bonds};

    // compute current bond order sum per atom
    const orderSum = new Array(atoms.length).fill(0);
    const neighborCount = new Array(atoms.length).fill(0);
    bonds.forEach(([a,b,t])=>{
        const o=bondOrder(t);
        orderSum[a]+=o; orderSum[b]+=o;
        neighborCount[a]++; neighborCount[b]++;
    });

    const center = atoms.reduce((acc,a)=>{
        if(a.symbol!=="H"){ acc.x+=a.dx; acc.y+=a.dy; acc.n++; }
        return acc;
    },{x:0,y:0,n:0});
    const cx = center.n? center.x/center.n : 0;
    const cy = center.n? center.y/center.n : 0;

    const countHNow = ()=>atoms.reduce((c,a)=>c+(a.symbol==="H"),0);
    const angles = [0, Math.PI/2, Math.PI, 3*Math.PI/2, Math.PI/4, -Math.PI/4, 3*Math.PI/4, -3*Math.PI/4];

    let hNow = countHNow();
    if(hNow>targetH){
        // If preset already has more H than formula, do nothing (avoid deleting).
        return {atoms,bonds};
    }

    // helper to place H around parent
    const placedPerParent = new Map();
    function placeH(parentIdx){
        const p = atoms[parentIdx];
        const used = placedPerParent.get(parentIdx)||0;
        placedPerParent.set(parentIdx, used+1);

        // outward direction from center; fallback angle list
        let vx = p.dx - cx, vy = p.dy - cy;
        let baseAng = Math.atan2(vy, vx);
        if(!isFinite(baseAng)) baseAng = 0;
        const jitter = (used%2===0?1:-1) * (0.55 + 0.15*Math.floor(used/2));
        const ang = baseAng + jitter;
        const r = 1.25;
        const dx = p.dx + Math.cos(ang)*r;
        const dy = p.dy + Math.sin(ang)*r;
        atoms.push({symbol:"H", dx, dy, hidden:false});
        const hIdx = atoms.length-1;
        bonds.push([parentIdx, hIdx, "single"]);
        orderSum[parentIdx]+=1;
        neighborCount[parentIdx]+=1;
        orderSum[hIdx]=1;
        neighborCount[hIdx]=1;
        return true;
    }

    // priority pass: O with single bond (OH), then N, then C, then others
    const priority = (sym)=>{
        if(sym==="O") return 0;
        if(sym==="N") return 1;
        if(sym==="C") return 2;
        return 3;
    };

    // iterate until H satisfied or no progress
    let guard=0;
    while(hNow < targetH && guard < 5000){
        guard++;
        let progressed=false;

        // sort candidate indices by priority and lower filled fraction first
        const idxs = atoms.map((a,i)=>({a,i}))
            .filter(o=>o.a.symbol!=="H")
            .sort((p,q)=>{
                const pp=priority(p.a.symbol), qp=priority(q.a.symbol);
                if(pp!==qp) return pp-qp;
                const pv=typicalValence(p.a.symbol), qv=typicalValence(q.a.symbol);
                const pf=(orderSum[p.i]/Math.max(1,pv)), qf=(orderSum[q.i]/Math.max(1,qv));
                return pf-qf;
            })
            .map(o=>o.i);

        for(const i of idxs){
            if(hNow>=targetH) break;
            const sym = atoms[i].symbol;
            const v = typicalValence(sym);
            const need = Math.max(0, v - orderSum[i]);
            if(need<=0) continue;
            // For oxygen: only add at most 1 H if it already has one heavy bond (to make OH)
            if(sym==="O"){
                if(orderSum[i]===1){
                    placeH(i); hNow++; progressed=true;
                }
            } else {
                // add H(s) but don't exceed target
                const addN = Math.min(need, targetH - hNow);
                for(let k=0;k<addN;k++){
                    placeH(i); hNow++; progressed=true;
                    if(hNow>=targetH) break;
                }
            }
        }

        if(!progressed) break;
    }
    return {atoms,bonds};
}

function getMoleculePreset(key){
    switch(key){
                case "C6H12O6":
            // Glucose (skeletal / Haworth-like framework). Show C/O framework + OH oxygens, hide H.
            // Visible: 6 C + 6 O. Hidden: 12 H.
            return {
                atoms: (function(){
                    const atoms=[];
                    const add=(symbol,dx,dy,hidden=false)=>{ atoms.push({symbol,dx,dy,hidden}); return atoms.length-1; };

                    const R={};
                    // ring (pyranose)
                    R.C1 = add("C", -1.8,  0.6);
                    R.C2 = add("C", -0.8,  1.3);
                    R.C3 = add("C",  0.2,  0.8);
                    R.C4 = add("C",  0.0, -0.4);
                    R.C5 = add("C", -1.1, -0.9);
                    R.O5 = add("O", -2.0, -0.3);
                    // exocyclic C6 (CH2OH)
                    R.C6 = add("C", -0.9,  2.4);

                    // OH oxygens (5): at C1,C2,C3,C4,C6
                    R.OH1 = add("O", -2.7,  1.2);
                    R.OH2 = add("O", -0.6,  2.4);
                    R.OH3 = add("O",  1.1,  1.2);
                    R.OH4 = add("O",  1.0, -1.1);
                    R.OH6 = add("O", -1.9,  3.0);

                                        return atoms;
                })(),
                bonds: (function(){
                    // indices must match above construction order
                    const b=[];
                    // ring bonds (C1-C2-C3-C4-C5-O5-C1)
                    b.push([0,1,"single"],[1,2,"single"],[2,3,"single"],[3,4,"single"],[4,5,"single"],[5,0,"single"]);
                    // C2-C6
                    b.push([1,6,"single"]);
                    // OH bonds
                    b.push([0,7,"single"],[1,8,"single"],[2,9,"single"],[3,10,"single"],[6,11,"single"]);
                    return b;
                })()
            };
        case "C12H22O11":
            return buildSucrosePreset();
        case "NH3":
            return {
                atoms: [
                    {symbol:"N", dx:0,    dy:0,   role:"center"},
                    {symbol:"H", dx:0.8,  dy:-1.25, role:"ligand"},
                    {symbol:"H", dx:-1.45,dy:0.25,  role:"ligand"},
                    {symbol:"H", dx:1.55, dy:0.85,  role:"ligand"},
                ],
                bonds: [[0,1,"single"],[0,2,"single"],[0,3,"single"]]
            };
        case "H2O":
            return {
                atoms:[
                    {symbol:"O", dx:0,   dy:0, role:"center"},
                    {symbol:"H", dx:-1.25, dy:0.9, role:"ligand"},
                    {symbol:"H", dx:1.25,  dy:0.9, role:"ligand"},
                ],
                bonds:[[0,1,"single"],[0,2,"single"]]
            };
        case "H2O2":
            // Hydrogen peroxide: H–O–O–H (single bonds), often drawn as a skewed/open-book shape
            return {
                atoms:[
                    {symbol:"O", dx:-0.9, dy:0.1, role:"center"},
                    {symbol:"O", dx:0.9,  dy:-0.1, role:"center"},
                    {symbol:"H", dx:-1.9, dy:-0.9, role:"ligand"},
                    {symbol:"H", dx:1.9,  dy:0.9,  role:"ligand"},
                ],
                bonds:[[0,1,"single"],[0,2,"single"],[1,3,"single"]]
            };
        case "CO2":
            return {
                atoms:[
                    {symbol:"O", dx:-1.85, dy:0, role:"ligand"},
                    {symbol:"C", dx:0,     dy:0, role:"center"},
                    {symbol:"O", dx:1.85,  dy:0, role:"ligand"},
                ],
                bonds:[[1,0,"double"],[1,2,"double"]]
            };
        case "CO":
            return {
                atoms:[
                    {symbol:"C", dx:-1.0, dy:0, role:"center"},
                    {symbol:"O", dx:1.0,  dy:0, role:"ligand"},
                ],
                bonds:[[0,1,"triple"]]
            };
        case "HCl":
            return {
                atoms:[
                    {symbol:"H",  dx:-1.0, dy:0, role:"ligand"},
                    {symbol:"Cl", dx:1.0,  dy:0, role:"center"},
                ],
                bonds:[[0,1,"single"]]
            };
        case "SO2":
            return {
                atoms:[
                    {symbol:"S", dx:0, dy:0, role:"center"},
                    {symbol:"O", dx:-1.6, dy:0.85, role:"ligand"},
                    {symbol:"O", dx:1.6,  dy:0.85, role:"ligand"},
                ],
                bonds:[[0,1,"double"],[0,2,"double"]]
            };
        case "NaOH":
            // Na+ ... OH- (draw ionic to O), O–H covalent
            return {
                atoms:[
                    {symbol:"Na", dx:-1.8, dy:0.0, role:"center"},
                    {symbol:"O",  dx:0.2,  dy:0.0, role:"center"},
                    {symbol:"H",  dx:1.5,  dy:0.0, role:"ligand"},
                ],
                bonds:[[0,1,"ionic"],[1,2,"single"]]
            };
        case "H2SO4":
            // HO–S(=O)2–OH (common Lewis depiction)
            return {
                atoms:[
                    {symbol:"S", dx:0, dy:0, role:"center"},
                    {symbol:"O", dx:-1.4, dy:-1.2, role:"ligand"}, // =O
                    {symbol:"O", dx: 1.4, dy:-1.2, role:"ligand"}, // =O
                    {symbol:"O", dx:-1.5, dy: 1.1, role:"ligand"}, // -OH
                    {symbol:"O", dx: 1.5, dy: 1.1, role:"ligand"}, // -OH
                    {symbol:"H", dx:-2.4, dy: 1.6, role:"ligand"},
                    {symbol:"H", dx: 2.4, dy: 1.6, role:"ligand"},
                ],
                bonds:[[0,1,"double"],[0,2,"double"],[0,3,"single"],[0,4,"single"],[3,5,"single"],[4,6,"single"]]
            };
        case "NaHCO3":
            // Na+ with bicarbonate HCO3− (planar around C)
            return {
                atoms:[
                    {symbol:"Na", dx:-2.2, dy:0.0, role:"center"}, // 0
                    {symbol:"C",  dx:0.0,  dy:0.0, role:"center"}, // 1
                    {symbol:"O",  dx:1.7,  dy:0.0, role:"ligand"}, // 2 =O
                    {symbol:"O",  dx:-0.9, dy:1.5, role:"ligand"}, // 3 OH
                    {symbol:"H",  dx:-1.9, dy:2.1, role:"ligand"}, // 4
                    {symbol:"O",  dx:-0.9, dy:-1.5, role:"ligand"},// 5 O− to Na
                ],
                bonds:[
                    [1,2,"double"],
                    [1,3,"single"],[3,4,"single"],
                    [1,5,"single"],[0,5,"ionic"]
                ]
            };
        case "NaCl":
        case "KCl":
        case "CaCl2":
            if(key==="CaCl2"){
                return {
                    atoms:[
                        {symbol:"Ca", dx:0, dy:0, role:"center"},
                        {symbol:"Cl", dx:-1.6, dy:0.9, role:"ligand"},
                        {symbol:"Cl", dx:1.6,  dy:0.9, role:"ligand"},
                    ],
                    bonds:[[0,1,"ionic"],[0,2,"ionic"]]
                };
            }
            return {
                atoms:[
                    {symbol:key.startsWith("Na")?"Na":"K", dx:-1.0, dy:0, role:"center"},
                    {symbol:"Cl", dx:1.0, dy:0, role:"ligand"},
                ],
                bonds:[[0,1,"ionic"]]
            };
        default:
            return null;
    }
}
// Convert preset into absolute target positions in region
function layoutFromPreset(preset, atomSize, region){
    const unit = atomSize * 0.95;
    const cx = region.cx;
    const cy = region.cy;

    const atoms = preset.atoms.map(a => {
        const hidden = false;
        const dx = (a.dx ?? 0);
        const dy = (a.dy ?? 0);

        return {
            symbol: a.symbol,
            hidden,
            x: cx + dx * unit - atomSize/2,
            y: cy + dy * unit - atomSize/2
        };
    });

    // Filter out any bonds that touch hidden atoms (skeletal mode)
    const bonds = (preset.bonds || [])
        .map(b => ({a:b[0], b:b[1], type:b[2] || "single"}))
        .filter(b => !(atoms[b.a]?.hidden || atoms[b.b]?.hidden));

    return {atoms, bonds};
}

// ---- Auto-shrink / auto-scale to prevent atom overlap (especially for large formulas/presets) ----
function __minCenterDistance(points, atomSize){
    // points: [{x,y}] top-left positions
    if(!points || points.length < 2) return Infinity;
    const centers = points.map(p => ({cx: p.x + atomSize/2, cy: p.y + atomSize/2}));
    let minD = Infinity;
    for(let i=0;i<centers.length;i++){
        for(let j=i+1;j<centers.length;j++){
            const dx = centers[i].cx - centers[j].cx;
            const dy = centers[i].cy - centers[j].cy;
            const d = Math.hypot(dx,dy);
            if(d < minD) minD = d;
        }
    }
    return minD;
}
function __clampPoints(points, atomSize, bounds){
    const {left, right, top, bottom} = bounds; // bottom is maxYTop
    return points.map(p => ({
        x: Math.min(Math.max(p.x, left), right - atomSize),
        y: Math.min(Math.max(p.y, top), bottom)
    }));
}

function __resolveOverlaps(points, atomSize, bounds){
    // Simple relaxation: push circles apart if they overlap.
    // points: [{x,y}] top-left; treated as circles with radius atomSize/2 around center.
    const {left, right, top, bottom} = bounds;
    const r = atomSize / 2;
    const minD = atomSize * 1.04; // desired center distance
    const centers = points.map(p => ({cx: p.x + r, cy: p.y + r}));

    for(let iter=0; iter<90; iter++){
        let moved = 0;
        for(let i=0;i<centers.length;i++){
            for(let j=i+1;j<centers.length;j++){
                let dx = centers[i].cx - centers[j].cx;
                let dy = centers[i].cy - centers[j].cy;
                let d = Math.hypot(dx,dy);

                if(d < 0.001){
                    // same spot - random nudge
                    dx = (Math.random()*2-1) * 0.5;
                    dy = (Math.random()*2-1) * 0.5;
                    d = Math.hypot(dx,dy);
                }
                if(d < minD){
                    const overlap = (minD - d) / 2;
                    const ux = dx / d;
                    const uy = dy / d;
                    centers[i].cx += ux * overlap;
                    centers[i].cy += uy * overlap;
                    centers[j].cx -= ux * overlap;
                    centers[j].cy -= uy * overlap;
                    moved++;
                }
            }
        }

        // clamp to bounds each iter
        for(const c of centers){
            c.cx = Math.min(Math.max(c.cx, left + r), right - r);
            c.cy = Math.min(Math.max(c.cy, top + r), bottom - r); // bottom is maxYTop, so add r allowance
        }

        if(moved === 0) break;
    }
    return centers.map(c => ({
        x: c.cx - r,
        y: c.cy - r
    }));
}
function __forceDistribute(points, atomSize, bounds){
    // Force-directed spreading to use more space and eliminate residual overlaps.
    const {left, right, top, bottom} = bounds;
    const r = atomSize/2;
    const minD = atomSize * 1.08;

    let nodes = points.map(p => ({
        x: p.x + r,
        y: p.y + r,
        vx: 0,
        vy: 0
    }));

    const cx = (left + right) / 2;
    const cy = (top + bottom) / 2;

    for(let iter=0; iter<520; iter++){
        // pairwise repulsion when too close
        for(let i=0;i<nodes.length;i++){
            for(let j=i+1;j<nodes.length;j++){
                let dx = nodes[i].x - nodes[j].x;
                let dy = nodes[i].y - nodes[j].y;
                let d = Math.hypot(dx,dy) || 0.001;
                if(d < minD){
                    const push = (minD - d) * 0.10;
                    dx /= d; dy /= d;
                    nodes[i].vx += dx * push;
                    nodes[i].vy += dy * push;
                    nodes[j].vx -= dx * push;
                    nodes[j].vy -= dy * push;
                }
            }
        }

        // soft centering so it doesn't explode outwards
        for(const n of nodes){
            n.vx += (cx - n.x) * 0.00045;
            n.vy += (cy - n.y) * 0.00045;
        }

        // integrate with damping + clamp
        for(const n of nodes){
            n.x += n.vx;
            n.y += n.vy;
            n.vx *= 0.80;
            n.vy *= 0.80;

            n.x = Math.min(Math.max(n.x, left + r), right - r);
            n.y = Math.min(Math.max(n.y, top + r), bottom - r);
        }
    }

    return nodes.map(n => ({ x: n.x - r, y: n.y - r }));
}


function __fitPresetNoOverlap(preset, startAtomSize, region, bounds, minAtomSize){
    // Iteratively shrink atom size until min center distance is large enough.
    // This is robust for dense presets (e.g., glucose/sucrose when showing explicit H).
    let s = startAtomSize;
    const safety = 1.04; // center distance should be >= atomSize * safety
    for(let iter=0; iter<10; iter++){
        const laid = layoutFromPreset(preset, s, region);
        let pts = __clampPoints(laid.atoms.map(p=>({x:p.x,y:p.y})), s, bounds);
        // 先做一次排斥鬆弛，把太靠近的球推開(比單純縮小更有效)
        pts = __resolveOverlaps(pts, s, bounds);
        pts = __forceDistribute(pts, s, bounds);
        pts = __resolveOverlaps(pts, s, bounds);
        const minD = __minCenterDistance(pts, s);

        if(minD >= s * safety) {
            return { atomSize: s, points: pts, bonds: laid.bonds };
        }
        // shrink a bit and retry
        const next = Math.max(minAtomSize, Math.floor(s * 0.92));
        if(next === s) break;
        s = next;
    }
    // fallback: return last layout (best effort)
    const laid = layoutFromPreset(preset, s, region);
    let pts = __clampPoints(laid.atoms.map(p=>({x:p.x,y:p.y})), s, bounds);
    pts = __resolveOverlaps(pts, s, bounds);
    pts = __forceDistribute(pts, s, bounds);
    pts = __resolveOverlaps(pts, s, bounds);
    return { atomSize: s, points: pts, bonds: laid.bonds };
}


// SVG bond rendering that follows floating atoms (updates each frame)
let __bondRAF = null;
function stopBondRAF(){
    if(__bondRAF){ cancelAnimationFrame(__bondRAF); __bondRAF = null; }
}

function renderBonds(svg, atoms, bonds){
    if(!svg) return;
    svg.innerHTML = "";
    const frag = document.createDocumentFragment();

    bonds.forEach((bd, idx) => {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("data-a", String(bd.a));
        line.setAttribute("data-b", String(bd.b));
        // class by type
        if (bd.type === "ionic") line.classList.add("dashed");
        if (bd.type === "double" || bd.type === "triple") line.classList.add("thin");
        frag.appendChild(line);

        // double/triple: render additional parallel lines
        if (bd.type === "double" || bd.type === "triple"){
            const extraCount = (bd.type === "triple") ? 2 : 1;
            for(let k=0;k<extraCount;k++){
                const l2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l2.setAttribute("data-a", String(bd.a));
                l2.setAttribute("data-b", String(bd.b));
                l2.classList.add("thin");
                l2.setAttribute("data-parallel", String(k+1));
                frag.appendChild(l2);
            }
        }
    });

    svg.appendChild(frag);

    // update positions now + each frame
    const update = () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`);
        svg.setAttribute("width", w);
        svg.setAttribute("height", h);

        const atomRects = atoms.map(el => el.getBoundingClientRect());
        const lines = svg.querySelectorAll("line");
        lines.forEach(line => {
            const a = parseInt(line.getAttribute("data-a"),10);
            const b = parseInt(line.getAttribute("data-b"),10);
            if(isNaN(a)||isNaN(b) || !atomRects[a] || !atomRects[b]) return;

            const ra = atomRects[a];
            const rb = atomRects[b];

            const x1 = ra.left + ra.width/2;
            const y1 = ra.top  + ra.height/2;
            const x2 = rb.left + rb.width/2;
            const y2 = rb.top  + rb.height/2;

            // For multi-lines, add slight perpendicular offset
            const parallel = parseInt(line.getAttribute("data-parallel")||"0",10);
            let ox = 0, oy = 0;
            if(parallel){
                const dx = x2-x1, dy = y2-y1;
                const len = Math.max(1, Math.hypot(dx,dy));
                const nx = -dy/len, ny = dx/len; // perpendicular unit
                const gap = Math.max(2.5, ra.width * 0.09);
                // alternate sides
                const sign = (parallel % 2 === 1) ? 1 : -1;
                ox = nx * gap * sign;
                oy = ny * gap * sign;
            }

            line.setAttribute("x1", String(x1 + ox));
            line.setAttribute("y1", String(y1 + oy));
            line.setAttribute("x2", String(x2 + ox));
            line.setAttribute("y2", String(y2 + oy));
        });

        __bondRAF = requestAnimationFrame(update);
    };

    stopBondRAF();
    update();
}



// ===== 文字自動縮放：字體依字數/空間自動調整，但「區域範圍固定」 =====
function fitTextToBox(el, minPx, maxPx) {
    if (!el) return;
    const cw = el.clientWidth, ch = el.clientHeight;
    if (cw <= 0 || ch <= 0) return;

    let low = minPx, high = maxPx, best = minPx;

    for (let i = 0; i < 18; i++) {
        const mid = (low + high) / 2;
        el.style.fontSize = mid + 'px';
        if (el.scrollWidth <= el.clientWidth && el.scrollHeight <= el.clientHeight) {
            best = mid;
            low = mid;
        } else {
            high = mid;
        }
    }
    el.style.fontSize = Math.floor(best) + 'px';
}

function refitInfoText() {
    const info = document.getElementById('info');
    if (!info) return;

    const h2 = info.querySelector('h2');
    if (!h2) return;

    // 只讓左側標題自動縮放；右側介紹維持固定字級，超出就自動斷行
    const boxH = info.clientHeight || 120;
    const titleMax = Math.min(180, Math.max(44, boxH * 0.85));

    fitTextToBox(h2, 24, titleMax);
}

let _refitTimer = null;
window.addEventListener('resize', () => {
    clearTimeout(_refitTimer);
    _refitTimer = setTimeout(refitInfoText, 120);
});


function play(opts = {}) {
    const area = document.getElementById("moleculeArea");
    const info = document.getElementById("info");
    const ansPanel = document.getElementById("ansPanel");

    // clear any pending play timers (so QR override can safely interrupt)
    clearPlayTimers();

    // reset
    area.innerHTML = "";
    const bondSvgReset = document.getElementById("bondLayer");
    if (bondSvgReset) { bondSvgReset.innerHTML = ""; bondSvgReset.style.opacity = 0; }
    stopBondRAF();
    info.style.opacity = 0;
    if (ansPanel) {
        ansPanel.style.opacity = 0;
        ansPanel.style.transform = "translateY(10px) scale(0.98)";
        const peek = ansPanel.querySelector("#peekImg");
        if (peek) {
            peek.style.opacity = 0;
            // keep src on fade-out? clearing avoids flashing on next non-override
            if (!__overrideActive) peek.removeAttribute("src");
        }
    }

    const data = (opts && opts.data) ? opts.data : rawData[index];
    // === 元素球動畫已停用：僅顯示右側中間的文字資訊與左側圖片 ===
    if(!ENABLE_ATOMS){
        // inject text (keep hidden for measuring)
        info.innerHTML = `<h2>${data.n}</h2><p><span class="descText">${renderZhuyinSide(data.d)}</span></p>`;
        info.style.opacity = 0;
        requestAnimationFrame(refitInfoText);

        // ensure bond layer hidden + stopped
        const bondSvgOff = document.getElementById("bondLayer");
        if (bondSvgOff) { bondSvgOff.innerHTML = ""; bondSvgOff.style.opacity = 0; }
        stopBondRAF();

        // choose random answer image (avoid last two)
        if (ansPanel) {
            const img = ansPanel.querySelector("#ansImg") || ansPanel.querySelector('img[data-role="answer"]') || ansPanel.querySelector("img");
            const base = pickAnswerBase();
            if (img) {
                setImageWithFallback(img, base, () => {
                    if (__overrideActive) requestAnimationFrame(positionPeekBetween);
                });
            }

            // QR override：仍保留 scanspeek（可選）
            const peek = ansPanel.querySelector("#peekImg");
            if (peek) {
                if (__overrideActive) {
                    const peekBase = pickPeekBase();
                    setImageWithFallback(peek, peekBase, () => {
                        requestAnimationFrame(positionPeekBetween);
                    });
                    peek.style.opacity = 1;
                    requestAnimationFrame(positionPeekBetween);
                } else {
                    peek.style.opacity = 0;
                    peek.removeAttribute("src");
                }
            }
        }

        // show panels
        const __showDelayMs = (opts && typeof opts.showDelayMs === "number") ? opts.showDelayMs : 900;
        const __fadeOutMs   = (opts && typeof opts.fadeOutMs === "number")   ? opts.fadeOutMs   : 6000;
        const __nextMs      = (opts && typeof opts.nextMs === "number")      ? opts.nextMs      : 7500;
        const __autoNext    = (opts && typeof opts.autoNext === "boolean")   ? opts.autoNext    : true;
        const __advance     = (opts && typeof opts.advanceIndex === "boolean") ? opts.advanceIndex : true;

        __setPlayTimeout(() => {
            refitInfoText();
            info.style.opacity = 1;
            if (ansPanel) {
                ansPanel.style.opacity = 1;
                ansPanel.style.transform = "translateY(0) scale(1)";
                if (__overrideActive) requestAnimationFrame(positionPeekBetween);
            }
        }, __showDelayMs);

        __setPlayTimeout(() => {
            info.style.opacity = 0;
            if (ansPanel) {
                ansPanel.style.opacity = 0;
                ansPanel.style.transform = "translateY(10px) scale(0.98)";
                const peek = ansPanel.querySelector("#peekImg");
                if (peek) {
                    peek.style.opacity = 0;
                    if (!__overrideActive) peek.removeAttribute("src");
                }
            }
        }, __fadeOutMs);

        if (__autoNext) {
            __setPlayTimeout(() => {
                if (__advance) index = (index + 1) % rawData.length;
                play();
            }, __nextMs);
        }
        return;
    }

    const atomList = parseFormula(data.n);
    const atomCount = atomList.length;

    // inject text (keep hidden for measuring)
    info.innerHTML = `<h2>${data.n}</h2><p>${renderZhuyinSide(data.d)}</p>`;
    info.style.opacity = 0;
    // 先讓文字自動縮放到固定盒子內（避免貼邊/溢出）
    requestAnimationFrame(refitInfoText);

    // probe base atom size (responsive)
    const probe = document.createElement('div');
    probe.className = 'atom H';
    probe.style.visibility = 'hidden';
    probe.style.left = '-9999px';
    probe.style.top = '-9999px';
    area.appendChild(probe);
    const baseAtomSize = probe.getBoundingClientRect().width || 80;
    probe.remove();

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const infoRect = info.getBoundingClientRect();
    const margin = Math.max(16, baseAtomSize * 0.25);

    // right-side region (tweak here if needed)
    const regionLeft = Math.max(margin, vw * 0.55);
    const regionRight = Math.min(vw - margin, vw * 0.98);
    const regionTop = Math.max(margin, vh * 0.08);

    const regionW = Math.max(10, regionRight - regionLeft);

    // compute layout with autoshrink and bounds
    let finalAtomSize = baseAtomSize;
    let cols = 1, rows = atomCount, cell = baseAtomSize;
    let maxYTop = Math.max(regionTop, Math.min(infoRect.top - finalAtomSize - margin, vh - finalAtomSize - margin));
    for (let iter = 0; iter < 3; iter++) {
        maxYTop = Math.max(regionTop, Math.min(infoRect.top - finalAtomSize - margin, vh - finalAtomSize - margin));
        const regionH = Math.max(10, (maxYTop + finalAtomSize) - regionTop);

        const aspect = regionW / regionH;
        cols = Math.max(1, Math.ceil(Math.sqrt(atomCount * aspect)));
        rows = Math.max(1, Math.ceil(atomCount / cols));
        cell = Math.min(regionW / cols, regionH / rows);

        // autoshrink (min 28px)
        finalAtomSize = Math.max(18, Math.min(baseAtomSize, cell * 0.88));
    }
    // recompute with final size
    maxYTop = Math.max(regionTop, Math.min(infoRect.top - finalAtomSize - margin, vh - finalAtomSize - margin));
    const regionH = Math.max(10, (maxYTop + finalAtomSize) - regionTop);
    cell = Math.min(regionW / cols, regionH / rows);

    let fontSize = Math.max(12, finalAtomSize * 0.42);

    // launch origin: near center but above info area
    const startX = vw * 0.50 - finalAtomSize / 2;
    const startY = Math.max(regionTop, Math.min(vh * 0.70, maxYTop));

    
    // ----- Decide molecular target positions (preset vs grid fallback) -----
    const formulaKey = normalizeFormulaKey(data.n);
    const presetRaw = getMoleculePreset(formulaKey);
    const formulaCounts = parseFormulaCounts(formulaKey);
    const preset = (presetRaw && presetRaw.atoms && presetRaw.bonds)
        ? addExplicitHydrogensToMatch(JSON.parse(JSON.stringify(presetRaw.atoms)), JSON.parse(JSON.stringify(presetRaw.bonds)), formulaCounts)
        : presetRaw;

    // Region center for molecule (keep in right side, above info)
    const regionCenterX = (regionLeft + regionRight) / 2;
    const regionCenterY = regionTop + regionH * 0.52;
    const region = { cx: regionCenterX, cy: regionCenterY };

    let targetList = null;
    let bondList = [];

    if (preset && preset.atoms && preset.atoms.length === atomCount) {
        // 針對「元素球很多」的分子(如 C₆H₁₂O₆ / C₁₂H₂₂O₁₁)：
        // 先用 preset 佈局，再自動縮小球/字，直到不會互相重疊
        // 針對「元素球很多」的分子：使用更大的可用範圍 + 力場分散，並在必要時再縮小重試
        const regionW = (regionRight - regionLeft);
        const regionH = (maxYTop - regionTop);
        const density = (atomCount * finalAtomSize * finalAtomSize) / Math.max(1, (regionW * regionH));

        // 空間很擠時，把可用範圍擴到更寬(幾乎整個畫面)，讓球有地方散開
        const wideBounds = density > 0.34;
        const marginX = Math.max(12, vw * 0.06);
        const marginY = 8;

        const boundsUsed = wideBounds
            ? { left: marginX, right: vw - marginX, top: regionTop + marginY, bottom: maxYTop }
            : { left: regionLeft, right: regionRight, top: regionTop, bottom: maxYTop };

        let attemptSize = finalAtomSize;
        let fitted = null;

        for(let tries=0; tries<8; tries++){
            fitted = __fitPresetNoOverlap(
                preset,
                attemptSize,
                region,
                boundsUsed,
                18
            );

            // 檢查是否仍有碰撞/重疊
            const minD = __minCenterDistance(fitted.points, fitted.atomSize);
            if(minD >= fitted.atomSize * 1.02) break;

            // 仍太擠 -> 再縮小一點重試
            const next = Math.max(18, Math.floor(attemptSize * 0.90));
            if(next === attemptSize) break;
            attemptSize = next;
        }

        // 用最佳尺寸覆蓋(避免 preset 彼此覆蓋)
        finalAtomSize = fitted.atomSize;
        targetList = fitted.points;
        bondList = fitted.bonds;
    }

    // If no preset (or mismatch), use grid fallback
    if (!targetList) {
        targetList = atomList.map((_, i) => {
            const c = i % cols;
            const r = Math.floor(i / cols);

            let x = regionLeft + c * cell + (cell - finalAtomSize) / 2;
            let y = regionTop + r * cell + (cell - finalAtomSize) / 2;

            // subtle jitter
            const jitter = Math.min(6, Math.max(0, (cell - finalAtomSize) / 4));

            // 如果空間很緊(球快貼到 cell 邊界)，就把 jitter 幾乎關掉避免重疊
            const tight = (cell - finalAtomSize) < (finalAtomSize * 0.18);
            const j = tight ? jitter * 0.15 : jitter;
            x += (Math.random() * 2 - 1) * j;
            y += (Math.random() * 2 - 1) * j;

            // clamp
            x = Math.min(Math.max(x, regionLeft), regionRight - finalAtomSize);
            y = Math.min(Math.max(y, regionTop), maxYTop);
            return { x, y };
        });

        // naive bonds for fallback: connect sequentially (visual only)
        bondList = atomList.length >= 2 ? atomList.slice(1).map((_, i) => ({ a: i, b: i+1, type: "single" })) : [];
    }

    // 若 preset 自動縮小了球體尺寸，這裡同步更新字體大小
    fontSize = Math.max(11, finalAtomSize * 0.42);

    const createdAtoms = [];

    targetList.forEach((pos, i) => {
        const meta = (preset && preset.atoms) ? preset.atoms[i] : null;
        const symbol = meta ? meta.symbol : atomList[i];
        const isHidden = false;

        const d = document.createElement("div");
        d.className = `atom ${symbol}`;
        // inner wrapper (floating animation runs here; outer keeps left/top positioning stable)
        const inner = document.createElement("div");
        inner.className = "atomInner";
        const label = document.createElement("span");
        label.className = "atomLabel";
        label.textContent = symbol;
        inner.appendChild(label);
        d.appendChild(inner);

        // dynamic sizing
        d.style.width = finalAtomSize + "px";
        d.style.height = finalAtomSize + "px";
        d.style.fontSize = fontSize + "px";

        // floating params (random per atom)
        const ampBase = Math.max(2, finalAtomSize * (0.05 + Math.random() * 0.08)); // px
        const ampX = (Math.random() * 2 - 1) * ampBase;
        const ampY = (Math.random() * 2 - 1) * ampBase * 1.15;
        const dur = (1.8 + Math.random() * 2.8); // seconds
        const delay = Math.random() * 1.6;

        d.style.setProperty('--floatAmpX', ampX.toFixed(2) + 'px');
        d.style.setProperty('--floatAmpY', ampY.toFixed(2) + 'px');
        d.style.setProperty('--floatDur', dur.toFixed(2) + 's');
        d.style.setProperty('--floatDelay', delay.toFixed(2) + 's');

        d.style.left = startX + "px";
        d.style.top = startY + "px";
        d.style.opacity = "0";

        area.appendChild(d);
        createdAtoms.push(d);

        const xClamped = pos.x;
        const yClamped = pos.y;

        if (!isHidden) {
            __setPlayTimeout(() => {
                d.style.opacity = "1";
            d.style.left = xClamped + "px";
            d.style.top = yClamped + "px";

            // start gentle floating AFTER the positioning transition settles
            __setPlayTimeout(() => d.classList.add("floating"), 1600);
            }, i * 35);
        }
    });

    // Draw bond lines (follows floating)
    const bondSvg = document.getElementById("bondLayer");
    if (bondSvg) {
        // normalize bond objects
        const bonds = (bondList || []).map(b => {
            if (Array.isArray(b)) return { a: b[0], b: b[1], type: b[2] || "single" };
            return b;
        });
        renderBonds(bondSvg, createdAtoms, bonds);
    }

    
    // choose random answer image (avoid last two)
    if (ansPanel) {
        const img = ansPanel.querySelector("#ansImg") || ansPanel.querySelector('img[data-role="answer"]') || ansPanel.querySelector("img");
        const base = pickAnswerBase();
        if (img) {
            setImageWithFallback(img, base, () => {
                // If override peek is showing, reposition after the answer image is ready
                if (__overrideActive) requestAnimationFrame(positionPeekBetween);
            });
        }

        // When QR override is active (11a / 11d), also show a random scanspeek image to the right
        const peek = ansPanel.querySelector("#peekImg");
        if (peek) {
            if (__overrideActive) {
                const peekBase = pickPeekBase();
                setImageWithFallback(peek, peekBase, () => {
                    requestAnimationFrame(positionPeekBetween);
                });
                peek.style.opacity = 1;
                // Ensure position is correct even if image is cached
                requestAnimationFrame(positionPeekBetween);
            } else {
                peek.style.opacity = 0;
                peek.removeAttribute("src");
            }
        }
    }


// show panels
const __showDelayMs = (opts && typeof opts.showDelayMs === "number") ? opts.showDelayMs : 900;
const __fadeOutMs   = (opts && typeof opts.fadeOutMs === "number")   ? opts.fadeOutMs   : 6000;
const __nextMs      = (opts && typeof opts.nextMs === "number")      ? opts.nextMs      : 7500;
const __autoNext    = (opts && typeof opts.autoNext === "boolean")   ? opts.autoNext    : true;
const __advance     = (opts && typeof opts.advanceIndex === "boolean") ? opts.advanceIndex : true;

__setPlayTimeout(() => {
    // 顯示前再做一次縮放（避免字體受載入/縮放影響）
    refitInfoText();
    info.style.opacity = 1;
    const bondSvg1 = document.getElementById('bondLayer');
    if (bondSvg1) bondSvg1.style.opacity = 1;
    if (ansPanel) {
        ansPanel.style.opacity = 1;
        ansPanel.style.transform = "translateY(0) scale(1)";
        // If peek is visible (QR override mode), put it between an-image and bg1
        if (__overrideActive) requestAnimationFrame(positionPeekBetween);
    }
}, __showDelayMs);

// fade out
__setPlayTimeout(() => {
    area.querySelectorAll('.atom').forEach(a => a.style.opacity = 0);
    const bondSvg2 = document.getElementById('bondLayer');
    if (bondSvg2) bondSvg2.style.opacity = 0;
    info.style.opacity = 0;
    if (ansPanel) {
        ansPanel.style.opacity = 0;
        ansPanel.style.transform = "translateY(10px) scale(0.98)";
        const peek = ansPanel.querySelector("#peekImg");
        if (peek) {
            peek.style.opacity = 0;
            // keep src on fade-out? clearing avoids flashing on next non-override
            if (!__overrideActive) peek.removeAttribute("src");
        }
    }
}, __fadeOutMs);

// next
if (__autoNext) {
    __setPlayTimeout(() => {
        if (__advance) index = (index + 1) % rawData.length;
        play();
    }, __nextMs);
}
}


function initStars(){
    const layer = document.getElementById("starLayer");
    if(!layer) return;

    // 重新生成（避免 resize 後位置跑掉）
    layer.innerHTML = "";

    const w = window.innerWidth;
    const h = window.innerHeight;

    // 星星數量：比原本多一點，閃爍更明顯
    const area = w * h;
    const count = Math.min(280, Math.max(120, Math.floor(area / 11000)));

    for(let i=0;i<count;i++){
        const s = document.createElement("span");

        // 約 14% 做成較亮的大星星
        const isBig = Math.random() < 0.18;
        s.className = isBig ? "star big" : "star";

        // 大小：小星 0.9~2.8px / 大星 2.2~4.8px
        const size = isBig ? (2.2 + Math.random() * 2.6) : (0.9 + Math.random() * 1.9);
        s.style.width = size + "px";
        s.style.height = size + "px";

        // 位置：整張畫面；稍微避開最底部 UI（留 12vh）
        const topMax = Math.max(0, h * 0.88);
        s.style.left = (Math.random() * w) + "px";
        s.style.top  = (Math.random() * topMax) + "px";

        // 閃爍參數：大星更慢一些、更有存在感
        const dur = isBig ? (1.8 + Math.random() * 2.2) : (0.9 + Math.random() * 1.9);
        const delay = Math.random() * 2.2;
        s.style.setProperty("--twinkleDur", dur + "s");
        s.style.setProperty("--twinkleDelay", delay + "s");

        // 初始亮度差異（動畫會拉到 1.0）
        const base = isBig ? (0.12 + Math.random() * 0.28) : (0.05 + Math.random() * 0.22);
        s.style.opacity = String(base);

        layer.appendChild(s);
    }
}

// resize 時重新佈局星星（節流）
let __starResizeTimer = null;
window.addEventListener("resize", () => {
    clearTimeout(__starResizeTimer);
    __starResizeTimer = setTimeout(initStars, 120);
});

let index = 0;

window.addEventListener("load", async () => {
    initStars();
    // 啟動 QR 掃描（後置鏡頭優先；失敗則用前置鏡頭掃描）
    startQrScanner().catch(err => console.error('QR 掃描鏡頭啟動失敗', err));
    // Preload answer images quickly, but don\'t block the scene if it\'s slow
    try {
        await Promise.race([
            // optional preloading (safe even on file://)
            new Promise((r) => setTimeout(r, 0)),
            new Promise((r) => setTimeout(r, 600))
        ]);
    } catch (e) {}
    // 等待 QR 掃描成功後才顯示內容
});
