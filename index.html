<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>聖誕化學大百科 - 比例縮放與非重疊版</title>
<style>
:root{ --ballTexture: none; }

:root {
    --gold: #ffeb3b;
    --tree-dark: #0a4d28;

    /* ===== 月亮光暈位置可調（bg0 右上月亮）=====
       這是「覆蓋在 bg0 上」的光暈特效（不會蓋住 bg1）
       你可以依照你的 bg0 月亮位置調整：
       - --moonTop / --moonRight：光暈的右上定位
       - --moonSize：光暈直徑
       - --moonGlowOpacity：整體亮度
    ============================================ */
    --moonTop: 5.5vh;
    --moonRight: 9vw;
    --moonSize: 40vmin;
    --moonGlowOpacity: 0.85;

    /* ===== 底部資訊區（固定範圍）可調參數 =====
       讓「描述標題(左)」與「描述內容(右)」永遠不碰到彼此、也不貼螢幕邊界。
       - --infoSide：左右邊界安全距離
       - --infoBottom：底部安全距離
       - --infoGap：左右兩塊的間距
       - --infoBoxH：兩塊共同高度（固定範圍）
       - --titleBoxW：左側標題塊寬度（固定範圍）
    ======================================== */
    --infoSide: 3.5vw;
    --infoBottom: 4vh;
    --infoGap: 2.6vw;
    --infoBoxH: 14vh;
    --titleBoxW: 26vw;

}

html, body {
    margin: 0; width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(circle at center, #0d1b2a 0%, #020824 100%);
    background-image: url('bg0.png');
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: white;
}


#moleculeArea { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }

#moleculeArea, #bondLayer{ display:none !important; }

.atom {
    position: absolute;
    width: 8vw; height: 8vw; /* 依螢幕寬度自動縮放 */
    min-width: 60px; min-height: 60px;
    max-width: 120px; max-height: 120px;
    border-radius: 50%;
    overflow: hidden;
    /* 元素顏色底（保留原本顏色渲染） */
    background-image: radial-gradient(circle at 30% 30%, var(--c1, #b0bec5), var(--c2, #455a64));
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    font-weight: 900; 
    font-size: 3vw; /* 文字同步縮放 */
    color: white;

    /* 強對比描邊，適合近視閱讀 */
    -webkit-text-stroke: 1px black;
    text-shadow: 2px 2px 4px #000;

    box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.4);
    transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* ball 紋理層（透明度可調），不影響元素色彩，只增加球面材質感 */
:root{
    --ballTexOpacity: 1.8;   /* ← 你要更透明就調小，例如 0.12；想更明顯就調大，例如 0.35 */
}
.atom::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: var(--ballTexture);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: var(--ballTexOpacity);
    mix-blend-mode: soft-light;
    pointer-events:none;
}

/* 內層：用來做「浮動動畫」，避免影響定位(left/top) */
.atomInner{
    position: relative;
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 1;
}

/* 文字 */
.atomLabel{
    position: relative;
    z-index: 2;
}

/* 定位完成後的小幅浮動：每顆球的頻率/距離由 JS 隨機寫入 CSS 變數 */
.atom.floating .atomInner{
    animation: atomFloat var(--floatDur, 3.2s) ease-in-out var(--floatDelay, 0s) infinite;
}

@keyframes atomFloat{
    0%   { transform: translate(0px, 0px); }
    25%  { transform: translate(calc(var(--floatAmpX, 6px) * 0.55), calc(var(--floatAmpY, 8px) * -0.85)); }
    50%  { transform: translate(var(--floatAmpX, 6px), var(--floatAmpY, 8px)); }
    75%  { transform: translate(calc(var(--floatAmpX, 6px) * -0.55), calc(var(--floatAmpY, 8px) * 0.95)); }
    100% { transform: translate(0px, 0px); }
}


/* 元素配色表 */
.H { --c1: #bbdefb; --c2: #1976d2; }
.O { --c1: #ffcdd2; --c2: #d32f2f; }
.C { --c1: #757575; --c2: #000000; }
.N { --c1: #c8e6c9; --c2: #388e3c; }
.S { --c1: #fff9c4; --c2: #fbc02d; }
.Cl { --c1: #dcedc8; --c2: #689f38; }
.Na, .K, .Ag { --c1: #e1bee7; --c2: #7b1fa2; }
.Ca, .Mg, .Al, .Ti, .Fe, .Cu { --c1: #ffe0b2; --c2: #e65100; }
.P, .Si { --c1: #ffccbc; --c2: #bf360c; }
.He, .Ne, .Ar { --c1: #f3e5f5; --c2: #7b1fa2; }


/* ========================= 位置座標可調區（描述文字） =========================
   #info 是「描述文字區」的容器（固定範圍、不貼邊、不互相碰）：
   - 左側：描述標題（化學式）
   - 右側：描述內容
   位置／大小請改 :root 內的：
   --infoSide / --infoBottom / --infoGap / --infoBoxH / --titleBoxW
   ============================================================================ */
#info{
    /* 讓標題與介紹可以各自定位（標題留左下、介紹移到右側中間） */
    position: absolute;
    inset: 0;
    z-index: 30;
    opacity: 0;
    transition: 0.8s;
    padding: 0;
    pointer-events: none;
}

#info h2{
    /* 元素名稱/化學式：維持舊版在左下方 */
    position: absolute;
    left: var(--infoSide);
    bottom: var(--infoBottom);

    width: clamp(220px, var(--titleBoxW), 36vw);
    height: clamp(96px, var(--infoBoxH), 22vh);

    margin: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    color: var(--gold);
    text-shadow: 3px 3px 10px #000;

    /* 半透明底塊：無描邊 */
    background: rgba(0, 10, 30, 0.40);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 28px;

    padding: 0 3.2vw;

    /* 固定區域 + 自動縮字：避免換行、避免溢出 */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#info p{
    /* 元素介紹：右側中間，固定字級，自動斷行 */
    position: absolute;
    right: var(--infoSide);
    top: 50%;
    transform: translateY(-50%);

    width: min(44vw, 680px);
    min-height: clamp(120px, 18vh, 200px);

    margin: 0;

    display: flex;
    align-items: center;
    justify-content: flex-start;

    font-weight: 800;
    font-size: 50px;
    line-height: 1.8;
    text-align: left;
    letter-spacing: 0.08em;
    color: #fff;

    /* 半透明底塊：無描邊 */
    background: rgba(0, 10, 30, 0.40);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 28px;

    padding: 1.2em 2.2vw 0.8em;
    box-sizing: border-box;

    white-space: normal;
    overflow: hidden;
    text-overflow: clip;
}

#info p .descText{
    display: block;
    width: 100%;
    max-width: 100%;
    text-align: left;
    white-space: normal;
    overflow-wrap: break-word;
    word-break: normal;
}


.zhuyin-side{
    display:inline-flex;
    white-space:nowrap;
    align-items:center;
    gap:0.02em;
    margin-right:0.04em;
    vertical-align:middle;
}
.zhuyin-side .base{
    font-size:1em;
    line-height:1;
}
.zhuyin-side .bpmf{
    position:relative;
    display:inline-flex;
    align-items:flex-start;
    justify-content:center;
    width:0.92em;
    margin-left:0.05em;
    vertical-align:middle;
    color:#ffe082;
    font-weight:700;
    font-size:0.34em;
    line-height:1;
    min-height:1.18em;
}
.zhuyin-side .bpmf .letters{
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    line-height:0.84;
}
.zhuyin-side .bpmf .letters span,
.zhuyin-side .bpmf .tone{
    display:block;
}
.zhuyin-side .bpmf .tone{
    position:absolute;
    right:-0.79em;
    top:-0.0em;
    font-size:0.95em;
    line-height:1;
    margin-left:0;
    align-self:auto;
}

rt{
    font-size: 0.38em;
    line-height: 1;
    color: #ffe082;
    font-weight: 700;
    letter-spacing: 0.02em;
}

/* 月亮光暈層：在 bg0 上、星星層下、bg1 下（不會蓋住 bg1） */
#moonHalo{
    position:absolute;
    inset:0;
    z-index: 1; /* bg0(底) < moonHalo(1) < stars(2) < haze(3) < bg1(5) */
    pointer-events:none;
    overflow:hidden;
}
#moonHalo::before{
    content:"";
    position:absolute;
    top: var(--moonTop);
    right: var(--moonRight);
    width: var(--moonSize);
    height: var(--moonSize);
    border-radius: 50%;
    /* 主要柔光：偏冷的月光色 */
    background: radial-gradient(circle,
        rgba(255,255,255,0.78) 0%,
        rgba(220,240,255,0.40) 28%,
        rgba(170,210,255,0.20) 52%,
        rgba(170,210,255,0.00) 76%);
    opacity: var(--moonGlowOpacity);
    filter: blur(2.2px);
    mix-blend-mode: screen;
    transform: translateZ(0);
    animation: moonPulse 3.2s ease-in-out infinite;
}
#moonHalo::after{
    content:"";
    position:absolute;
    top: calc(var(--moonTop) + var(--moonSize) * 0.08);
    right: calc(var(--moonRight) + var(--moonSize) * 0.10);
    width: calc(var(--moonSize) * 0.72);
    height: calc(var(--moonSize) * 0.72);
    border-radius: 50%;
    background: radial-gradient(circle,
        rgba(255,255,255,0.36) 0%,
        rgba(210,235,255,0.18) 34%,
        rgba(210,235,255,0.00) 72%);
    opacity: calc(var(--moonGlowOpacity) * 0.9);
    filter: blur(3.2px);
    mix-blend-mode: screen;
    transform: translateZ(0);
    animation: moonPulse 4.1s ease-in-out infinite reverse;
}
@keyframes moonPulse{
    0%   { transform: scale(0.90); opacity: calc(var(--moonGlowOpacity) * 0.60); }
    50%  { transform: scale(1.14); opacity: calc(var(--moonGlowOpacity) * 1.00); }
    100% { transform: scale(0.92); opacity: calc(var(--moonGlowOpacity) * 0.65); }
}



/* 背景前景圖層（同資料夾：bg0.png / bg1.png） */
#bg1Layer{
    position:absolute;
    left:50%;
    bottom:0;
    transform: translateX(-50%);
    height: 88vh;
    width: auto;
    z-index: 5;              /* 在背景之上、元素球之下 */
    pointer-events:none;
    opacity: 0.98;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.35));
}
#bg1Layer img{
    height:100%;
    width:auto;
    max-width: 100vw;
    display:block;
}

/* 霧化/氛圍層：在背景與前景之間 */
/* 閃爍星星層：在 bg0 上、bg1 下（不會蓋住 bg1） */
#starLayer{
    position:absolute;
    inset:0;
    z-index: 2;           /* bg0(底) < stars < haze(3) < bg1(5) < atoms(20) */
    pointer-events:none;
    overflow:hidden;
}
#starLayer .star{
    position:absolute;
    border-radius: 50%;
    background: rgba(255,255,255,1);
    /* 更明顯的發光（你可調下面兩個強度） */
    box-shadow: 0 0 18px rgba(255,255,255,0.95), 0 0 34px rgba(170,210,255,0.55);
    filter: brightness(1.10);
    opacity: 0.0;
    transform: translateZ(0);
    animation: twinkle var(--twinkleDur, 3s) ease-in-out var(--twinkleDelay, 0s) infinite;
}
#starLayer .star.big{
    box-shadow: 0 0 26px rgba(255,255,255,0.98), 0 0 58px rgba(170,210,255,0.60), 0 0 86px rgba(120,180,255,0.25);
    filter: brightness(1.30);
}

@keyframes twinkle{
    0%   { opacity: 0.03; transform: scale(0.68); filter: brightness(0.85); }
    32%  { opacity: 1.00; transform: scale(1.42); filter: brightness(1.85); }
    58%  { opacity: 0.18; transform: scale(0.92); filter: brightness(1.05); }
    100% { opacity: 0.06; transform: scale(0.74); filter: brightness(0.90); }
}
.haze{
    position:absolute;
    inset:0;
    z-index: 3;
    pointer-events:none;
    background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.00) 45%),
        linear-gradient(to top, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.0) 55%);
}



/* ========================= 位置座標可調區（an1~an6 圖） =========================
   #ansPanel 是左側圖片面板（顯示 an1~an6 隨機圖）的定位座標：
   - left: 4vw   → 距離螢幕左側 4% 視窗寬度
   - top:  14vh  → 距離螢幕頂部 14% 視窗高度
   - width:34vw  → 面板寬度（會再被 max/min 限制）
   你可以調整：
   - left / top：面板移動位置
   - width：放大/縮小圖片面板
   - z-index：圖層（目前在 bg1 之下、元素球之下/上視需求可調）
   ============================================================================ */
/* 左側答案圖（描述出現時顯示） */
#ansPanel{
    position:absolute;
    left: 4vw;
    top: 14vh;
    width: 34vw;
    max-width: 620px;
    min-width: 220px;
    z-index: 12;
    opacity: 0;
    transform: translateY(10px) scale(0.98);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,0.45));
}
#ansPanel img{
    width:100%;
    height:auto;
    display:block;
    border-radius: 18px;
    background: transparent;
    backdrop-filter: none;
}


#ansPanel{ overflow: visible; }
#peekImg{
    /*
      scanspeek1~6 位置：由 JS 動態放在「an1~6（ansImg）」與「bg1」的中間。
      用 fixed 讓它不受 ansPanel 影響，並能精準對齊兩者之間。
    */
    position: fixed;
    left: 0;
    top: 0;
    transform: translate(-50%, -50%);

    width: min(16vw, 260px);
    max-width: 260px;
    min-width: 120px;
    height:auto;
    display:block;
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events:none;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,0.45));

    /* 圖層優先度：高於 an1~6(12) 與 bg1(5) */
    z-index: 60;
}



/* ===== Bond lines (SVG) ===== */
#bondLayer{
    position:absolute;
    inset:0;
    z-index: 19; /* under atoms (20), above bg1 (5) */
    pointer-events:none;
}
#bondLayer line{
    stroke: rgba(255,255,255,0.92);
    stroke-width: 8;
    stroke-linecap: round;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.55));
}
#bondLayer line.thin{
    stroke-width: 5;
    opacity: 0.78;
}
#bondLayer line.dashed{
    stroke-dasharray: 10 10;
    opacity: 0.72;
}


/* ========================= 前置鏡頭小畫面（左上角） ========================= */
#selfCamWrap{
    position: fixed;
    top: 12px;
    left: 12px;
    width: min(22vw, 240px);
    aspect-ratio: 4 / 3;
    border-radius: 14px;
    overflow: hidden;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    z-index: 9999;
    pointer-events: none; /* 不要擋到遊戲操作 */
}
#selfCamWrap video,
#selfCamWrap canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit: cover;
    transform: scaleX(-1); /* 自拍鏡像 */
}
#selfCamWrap canvas{
    pointer-events:none;
}
#selfCamWatermark{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit: contain;
    z-index: 2;
    pointer-events:none;
}
#selfCamHint{
    z-index: 3;
    position:absolute;
    left: 8px;
    bottom: 8px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #fff;
    background: rgba(0,0,0,0.45);
    padding: 3px 8px;
    border-radius: 999px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.55);
}
@media (max-width: 520px){
    #selfCamWrap{ width: min(34vw, 180px); }
}
/* ========================================================================== */



/* ========================= QR 掃描成功中央發光特效 ========================= */
#scanSuccessFx{
    position: fixed;
    inset: 0;
    z-index: 120;
    pointer-events: none;
    opacity: 0;
}
#scanSuccessFx.active{
    opacity: 1;
}
#scanSuccessFx .fx-core,
#scanSuccessFx .fx-ring,
#scanSuccessFx .fx-rays,
#scanSuccessFx .fx-spark{
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}
#scanSuccessFx .fx-core{
    width: min(16vmin, 160px);
    height: min(16vmin, 160px);
    border-radius: 50%;
    background:
        radial-gradient(circle,
            rgba(255,255,255,0.98) 0%,
            rgba(255,244,180,0.95) 18%,
            rgba(255,214,76,0.78) 38%,
            rgba(255,214,76,0.00) 72%);
    filter: blur(1px);
    box-shadow:
        0 0 40px rgba(255,214,76,0.95),
        0 0 90px rgba(255,244,180,0.78),
        0 0 150px rgba(255,255,255,0.38);
}
#scanSuccessFx .fx-ring{
    width: min(26vmin, 280px);
    height: min(26vmin, 280px);
    border-radius: 50%;
    border: min(0.8vmin, 8px) solid rgba(255,236,140,0.88);
    box-shadow:
        0 0 22px rgba(255,224,120,0.92),
        inset 0 0 22px rgba(255,250,210,0.48);
}
#scanSuccessFx .fx-rays{
    width: min(40vmin, 420px);
    height: min(40vmin, 420px);
    border-radius: 50%;
    background:
        conic-gradient(
            from 0deg,
            rgba(255,255,255,0.00) 0deg,
            rgba(255,245,190,0.92) 20deg,
            rgba(255,255,255,0.00) 42deg,
            rgba(255,220,110,0.74) 68deg,
            rgba(255,255,255,0.00) 96deg,
            rgba(255,245,190,0.88) 128deg,
            rgba(255,255,255,0.00) 160deg,
            rgba(255,220,110,0.72) 202deg,
            rgba(255,255,255,0.00) 234deg,
            rgba(255,245,190,0.85) 280deg,
            rgba(255,255,255,0.00) 322deg,
            rgba(255,220,110,0.78) 346deg,
            rgba(255,255,255,0.00) 360deg);
    mask: radial-gradient(circle, transparent 0 30%, #000 53%, transparent 72%);
    -webkit-mask: radial-gradient(circle, transparent 0 30%, #000 53%, transparent 72%);
    filter: blur(1.5px);
}
#scanSuccessFx .fx-spark{
    width: min(52vmin, 540px);
    height: min(52vmin, 540px);
    border-radius: 50%;
    background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.95) 0 0.45vmin, transparent 0.85vmin),
        radial-gradient(circle at 82% 28%, rgba(255,244,190,0.92) 0 0.4vmin, transparent 0.9vmin),
        radial-gradient(circle at 88% 62%, rgba(255,214,100,0.88) 0 0.36vmin, transparent 0.82vmin),
        radial-gradient(circle at 68% 88%, rgba(255,255,255,0.94) 0 0.42vmin, transparent 0.92vmin),
        radial-gradient(circle at 30% 92%, rgba(255,236,140,0.88) 0 0.34vmin, transparent 0.8vmin),
        radial-gradient(circle at 12% 70%, rgba(255,255,255,0.95) 0 0.44vmin, transparent 0.9vmin),
        radial-gradient(circle at 10% 34%, rgba(255,224,110,0.88) 0 0.36vmin, transparent 0.82vmin),
        radial-gradient(circle at 32% 12%, rgba(255,255,255,0.96) 0 0.38vmin, transparent 0.86vmin);
    filter: drop-shadow(0 0 10px rgba(255,245,180,0.65));
}
#scanSuccessFx.active .fx-core{
    animation: scanFxCore 780ms cubic-bezier(0.18, 0.72, 0.22, 1) both;
}
#scanSuccessFx.active .fx-ring{
    animation: scanFxRing 820ms cubic-bezier(0.12, 0.72, 0.2, 1) both;
}
#scanSuccessFx.active .fx-rays{

/* ========================= 前置鏡頭 / 浮水印顯示開關 =========================
   說明：
   - SHOW_SELF_CAM_PREVIEW：true=顯示左上前置鏡頭視窗，false=隱藏左上前置鏡頭視窗
   - SHOW_WATERMARK：true=顯示 watermark，false=隱藏 watermark
   - ALLOW_SELF_CAM_QR_FALLBACK：true=若後鏡頭無法啟動，允許改用前鏡頭做 QR 掃描
     （即使 SHOW_SELF_CAM_PREVIEW=false，前鏡頭仍可在背景啟動供 QR 掃描使用）
============================================================================ */
const CAMERA_UI_CONFIG = {
  SHOW_SELF_CAM_PREVIEW: false,
  SHOW_WATERMARK: false,
  ALLOW_SELF_CAM_QR_FALLBACK: true
};

/* ========================= 前置鏡頭啟動（參考 scan game.html 的寫法） =========================
   - 頁面載入後立即 getUserMedia()
   - 使用 facingMode: "user" 取得前置鏡頭
   - 若支援 FaceDetector，會在小畫面上畫出臉部框（可用於互動/偵測）
=========================================================================================== */
const __selfCamWrap = document.getElementById('selfCamWrap');
const __selfCam = document.getElementById('selfCam');
const __selfOverlay = document.getElementById('selfOverlay');
const __selfCamWatermark = document.getElementById('selfCamWatermark');
const __selfHint = document.getElementById('selfCamHint');
const __selfCtx = __selfOverlay ? __selfOverlay.getContext('2d') : null;

function applyCameraUiConfig(){
  if(__selfCamWrap){
    __selfCamWrap.style.display = CAMERA_UI_CONFIG.SHOW_SELF_CAM_PREVIEW ? '' : 'none';
  }
  if(__selfCamWatermark){
    __selfCamWatermark.style.display = CAMERA_UI_CONFIG.SHOW_WATERMARK ? '' : 'none';
  }
}
applyCameraUiConfig();

let __selfStream = null;
let __faceDetector = null;

try{
  if ('FaceDetector' in window){
    __faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
  }
}catch(e){
  __faceDetector = null;
}

async function startSelfCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    throw new Error('Browser does not support getUserMedia');
  }

  // 先嘗試前置鏡頭；失敗再退回一般 video:true
  try{
    __selfStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
  }catch(e){
    __selfStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  }

  __selfCam.srcObject = __selfStream;

  // 某些裝置需要顯式 play
  try{ await __selfCam.play(); }catch(e){}

  requestAnimationFrame(selfCamLoop);
}

async function selfCamLoop(){
  if(__selfCam && __selfCam.readyState === __selfCam.HAVE_ENOUGH_DATA && __selfCtx){
    const w = __selfCam.videoWidth || 0;
    const h = __selfCam.videoHeight || 0;

    if(w > 0 && h > 0){
      if(__selfOverlay.width !== w || __selfOverlay.height !== h){
        __selfOverlay.width = w;
        __selfOverlay.height = h;
      }

      // 畫臉部框（可選）
      __selfCtx.clearRect(0, 0, w, h);

      if(__faceDetector){
        try{
          const faces = await __faceDetector.detect(__selfCam);
          __selfCtx.lineWidth = Math.max(2, Math.round(w * 0.006));
          __selfCtx.strokeStyle = 'rgba(0,255,255,0.95)';
          for(const f of faces){
            const b = f.boundingBox;
            __selfCtx.strokeRect(b.x, b.y, b.width, b.height);
          }
        }catch(e){
          // detect 失敗就不畫（避免干擾）
        }
      }
    }
  }
  requestAnimationFrame(selfCamLoop);
}

// 頁面載入後立即啟動前置鏡頭（顯示預覽或允許 QR fallback 時才啟動）
if (CAMERA_UI_CONFIG.SHOW_SELF_CAM_PREVIEW || CAMERA_UI_CONFIG.ALLOW_SELF_CAM_QR_FALLBACK) {
  startSelfCamera().catch(err => {
    console.error('前置鏡頭啟動失敗', err);
    if(__selfHint) __selfHint.textContent = '前置鏡頭：未授權/無法啟動';
  });
}

// 離開頁面時關閉鏡頭
window.addEventListener('beforeunload', () => {
  try{
    if(__selfStream){
      __selfStream.getTracks().forEach(t => t.stop());
      __selfStream = null;
    }
  }catch(e){}
});

function renderZhuyinSide(html){
    function buildZhuyinUnit(ch, syllable){
        const s = String(syllable || '').trim();
        const m = s.match(/^(.*?)([˙ˊˇˋ])?$/);
        const letters = (m && m[1] ? m[1] : s).split('');
        const tone = (m && m[2]) ? m[2] : '';
        const lettersHtml = letters.map(function(part){
            return '<span>' + part + '</span>';
        }).join('');
        const toneHtml = tone ? '<span class="tone">' + tone + '</span>' : '';
        return '<span class="zhuyin-side"><span class="base">' + ch + '</span><span class="bpmf"><span class="letters">' + lettersHtml + '</span>' + toneHtml + '</span></span>';
    }

    return html.replace(/<ruby>(.*?)<rt>(.*?)<\/rt><\/ruby>/g, function(_, base, bpmf){
        const chars = Array.from(String(base).trim());
        const syllables = String(bpmf).trim().split(/\s+/).filter(Boolean);

        if (chars.length > 1 && chars.length === syllables.length) {
            return chars.map(function(ch, i){
                return buildZhuyinUnit(ch, syllables[i]);
            }).join('');
        }

        if (chars.length === 1 && syllables.length === 1) {
            return buildZhuyinUnit(chars[0], syllables[0]);
        }

        return '<span class="zhuyin-side"><span class="base">' + base + '</span><span class="bpmf"><span class="letters">' + Array.from(String(bpmf).replace(/\s+/g, '')).map(function(part){ return '<span>' + part + '</span>'; }).join('') + '</span></span></span>';
    });
}

function triggerScanSuccessFx(duration = 900){
    const fx = document.getElementById('scanSuccessFx');
    if (!fx) return;
    clearTimeout(__scanFxTimer);
    fx.classList.remove('active');
    void fx.offsetWidth;
    fx.classList.add('active');

    }, duration);

function showFormulaTemporarily(formulaStr, ms = 5000){
    const data = __findDataByFormula(formulaStr);
    if (!data) return;

    const now = performance.now();

    // 同一張 QR 反覆掃描時，不要一直重置（避免永遠回不去輪播）
    if (__overrideActive && __overrideFormula === formulaStr && now < __qrLockUntil) {
        return;
    }

    // 第一次進入 override 時，記下當下輪播位置
    if (!__overrideActive) {
        __resumeIndex = index;
    }

    __hasScannedOnce = true;

    __overrideActive = true;
    __overrideFormula = formulaStr;
    __qrLockUntil = now + 1200;

    // 立即清除當前元素球與描述（包含原本輪播的計時器）
    clearPlayTimers();
    __hardClearScene();

    // 先播放掃描成功特效，再顯示元素
    triggerScanSuccessFx(900);

    __setPlayTimeout(() => {
        play({
            data,
            autoNext: false,
            advanceIndex: false,
            showDelayMs: 220,
            fadeOutMs: Math.max(0, ms - 900)
        });
    }, 640);

    // ms 後清空畫面，等待下一次 QR 掃描
    clearTimeout(__overrideTimer);
    __overrideTimer = setTimeout(() => {
        __overrideActive = false;
        __overrideFormula = "";

        clearPlayTimers();
        __hardClearScene();
    }, ms);
}

async function startQrScanner(){
    // 先嘗試啟動「後置鏡頭」掃 QR；若裝置不允許同時開兩顆鏡頭，退回用前置鏡頭畫面做掃描
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        throw new Error('Browser does not support getUserMedia');
    }

    try{
        __qrStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
        });
        if (__qrVideo) {
            __qrVideo.srcObject = __qrStream;
            try{ await __qrVideo.play(); }catch(e){}
        }
    }catch(e){
        // fallback：用前置鏡頭的 video 當掃描來源（若你把 QR 放在前鏡頭前面也能觸發）
        if (CAMERA_UI_CONFIG.ALLOW_SELF_CAM_QR_FALLBACK && __selfCam && __selfCam.srcObject) {
            __useSelfCamForQR = true;
            console.warn('後置鏡頭啟動失敗，改用前置鏡頭做 QR 掃描（若要掃 QR，請把 QR 對準前鏡頭）。', e);
        } else {
            console.warn('後置鏡頭啟動失敗，且目前未啟用前置鏡頭 QR fallback。', e);
        }
    }

    requestAnimationFrame(qrScanLoop);
}

function qrScanLoop(ts){
    // 掃描成功後 5 秒內不再進行任何掃描
    if (ts < __scanPausedUntil) {
        requestAnimationFrame(qrScanLoop);
        return;
    }
    const srcVideo = (__useSelfCamForQR ? __selfCam : __qrVideo);
    if (srcVideo && __qrCtx && window.jsQR) {
        if (srcVideo.readyState === srcVideo.HAVE_ENOUGH_DATA) {
            if (ts - __lastScanTime >= __SCAN_INTERVAL) {
                __lastScanTime = ts;

                const w = srcVideo.videoWidth || 0;
                const h = srcVideo.videoHeight || 0;

                if (w > 0 && h > 0) {
                    if (__qrCanvas.width !== w || __qrCanvas.height !== h) {
                        __qrCanvas.width = w;
                        __qrCanvas.height = h;
                    }

                    __qrCtx.drawImage(srcVideo, 0, 0, w, h);
                    const imageData = __qrCtx.getImageData(0, 0, w, h);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code && code.data) {
                        const value = String(code.data).trim();
                        const formula = __qrMap[value];
                        if (formula) {
                            // 成功掃描後：5 秒內不再掃描（避免重複觸發）
                            __scanPausedUntil = ts + 5000;
                            showFormulaTemporarily(formula, 5000);
                        }
                    }
                }
            }
        }
    }
    requestAnimationFrame(qrScanLoop);
}

/* ------------------ Left answer images (an1~an6) ------------------
   - Randomly pick 1 image when formula/description shows
   - Avoid repeating with the last 2 picks (by base name, not URL)
   - Robust loading on file:// with case-sensitive extensions:
     tries png/PNG/Png + jpg/JPG/Jpg + jpeg/JPEG/Jpeg + webp/WEBP/Webp
------------------------------------------------------------------- */
const answerBases = ["an1","an2","an3","an4","an5","an6"];
const peekBases  = ["scanspeek1","scanspeek2","scanspeek3","scanspeek4","scanspeek5","scanspeek6"];
let lastPeekBase = "";
function pickPeekBase(){
    // Avoid repeating the same peek twice in a row if possible
    let candidates = peekBases.filter(b => b !== lastPeekBase);
    if (candidates.length === 0) candidates = [...peekBases];
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    lastPeekBase = pick;
    return pick;
}

// Place scanspeek image between the current an-image (ansImg/ansPanel) and bg1.
function __clamp(v, min, max){ return Math.min(Math.max(v, min), max); }
function positionPeekBetween(){
    const peek = document.getElementById('peekImg');
    if (!peek) return;

    // Only position when it's actually visible/active
    if (peek.style.opacity === '0' || !peek.getAttribute('src')) return;

    const ansImg = document.getElementById('ansImg');
    const ansPanel = document.getElementById('ansPanel');
    const bg1 = document.getElementById('bg1Layer');
    if (!ansPanel || !bg1) return;

    const aRect = (ansImg && ansImg.getBoundingClientRect().width > 0)
        ? ansImg.getBoundingClientRect()
        : ansPanel.getBoundingClientRect();
    const bRect = bg1.getBoundingClientRect();

    // Midpoint between an-image's right edge and bg1's left edge
    let x = (aRect.right + bRect.left) / 2;
    let y = aRect.top + aRect.height / 2;

    // If they overlap a lot (or bg1 is to the left), bias slightly to the right of an-image
    const gap = bRect.left - aRect.right;
    if (!isFinite(x) || gap < 40) x = aRect.right + 70;
    if (!isFinite(y)) y = aRect.top + aRect.height / 2;


    // 往左上方推移（約 1.5 顆球體距離），允許局部蓋到 an1~6
    const sampleBall = document.querySelector('.atom');
    const ballSize = (sampleBall && sampleBall.getBoundingClientRect().width) ? sampleBall.getBoundingClientRect().width : 100;
    const offset = 1.5 * ballSize;
    x -= offset;
    y -= offset * 0.7;

    // Clamp inside viewport based on peek size
    const pRect = peek.getBoundingClientRect();
    const halfW = Math.max(60, pRect.width / 2);
    const halfH = Math.max(60, pRect.height / 2);
    const margin = 10;

    x = __clamp(x, halfW + margin, window.innerWidth - halfW - margin);
    y = __clamp(y, halfH + margin, window.innerHeight - halfH - margin);

    peek.style.left = `${x}px`;
    peek.style.top = `${y}px`;
    peek.style.transform = 'translate(-50%, -50%)';
}

window.addEventListener('resize', () => {
    if (__overrideActive) requestAnimationFrame(positionPeekBetween);
});

const answerExts  = ["png","jpg","jpeg","webp"];
let lastAnswerBases = []; // keep last 2 picked bases

function buildCandidateUrls(base){
    // base without extension -> try many case variants for extension
    // IMPORTANT: On Windows file://, folder names may contain spaces;
    // using relative URL is fine as long as files are in the same folder.
    const uniq = (arr) => [...new Set(arr.filter(Boolean))];

    // If base already has extension, just try a few case variants
    if (/\.[a-zA-Z0-9]+$/.test(base)) {
        return uniq([base, base.toLowerCase(), base.toUpperCase()]);
    }

    // We'll keep base itself as-is (an1), and also try lower/upper (AN1 etc.)
    const baseVariants = uniq([base, base.toLowerCase(), base.toUpperCase()]);

    const out = [];
    for (const b of baseVariants){
        for (const ext of answerExts){
            const e = String(ext);
            // common variants: png / PNG / Png
            const variants = uniq([
                e,
                e.toLowerCase(),
                e.toUpperCase(),
                e.charAt(0).toUpperCase() + e.slice(1).toLowerCase()
            ]);
            for (const v of variants){
                out.push(`${b}.${v}`);
            }
        }
    }
    return uniq(out);
}

function pickAnswerBase(){
    // Avoid last 2 if possible
    const exclude = new Set(lastAnswerBases);
    let candidates = answerBases.filter(b => !exclude.has(b));
    if (candidates.length === 0) candidates = [...answerBases];

    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    lastAnswerBases = [pick, ...lastAnswerBases].slice(0,2);
    return pick;
}

function setImageWithFallback(imgEl, base, onReady){
    if (!imgEl || !base) return;

    const candidates = buildCandidateUrls(base);
    let k = 0;

    const tryNext = () => {
        if (k >= candidates.length) {
            // all failed -> hide
            if (imgEl.parentElement) imgEl.parentElement.style.display = "none";
            return;
        }
        const url = candidates[k++];
        const testImg = new Image();
        testImg.onload = () => {
            imgEl.src = url;
            if (imgEl.parentElement) imgEl.parentElement.style.display = "block";
            if (typeof onReady === "function") onReady(url);
        };
        testImg.onerror = () => {
            tryNext();
        };

        // IMPORTANT: do NOT append cache-bust query on file:// to avoid weird resolution
        testImg.src = (location.protocol === "file:") ? url : (url + (url.includes("?") ? "&" : "?") + "v=" + Date.now());
    };

    tryNext();
}

/* ------------------ Ball texture (ball.*) ------------------
   Put ball.png / ball.PNG (or jpg/jpeg/webp) in the SAME folder as this HTML.
   We'll resolve the first file that exists (case-insensitive extension),
   and expose it to CSS via :root{ --ballTexture: url("...") }.
----------------------------------------------------------- */
function resolveBallTexture(){
    const candidates = buildCandidateUrls("ball");
    let k = 0;

    const tryNext = () => {
        if (k >= candidates.length) {
            // If not found, keep default gradient only.
            document.documentElement.style.setProperty("--ballTexture", "none");
            return;
        }
        const url = candidates[k++];
        const testImg = new Image();
        testImg.onload = () => {
            // Set CSS variable as url("...") so CSS can use it in background-image.
            document.documentElement.style.setProperty("--ballTexture", `url("${url}")`);
        };
        testImg.onerror = () => tryNext();

        // Same rule: don't append cache-bust on file://
        testImg.src = (location.protocol === "file:") ? url : (url + (url.includes("?") ? "&" : "?") + "v=" + Date.now());
    };

    tryNext();
}

function parseFormula(formula) {
    // 1) 將 Unicode 下標數字(₀-₉)轉成一般數字，避免 H₂O 被當成 H1O1
    const subMap = { '₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9' };
    const f = String(formula)
        .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, ch => subMap[ch] ?? ch)
        .replace(/\s+/g, ''); // 移除空白 (例如 "N₂ + O₂ + Ar")

    // 2) 解析支援：元素符號、一般數字、括號倍數、混合物加號(+)
    //    也容忍像 CxHyOzNwSw 這種變數形式：遇到元素後接小寫字母(x/y/z...) 時，視為「未定係數」→ 預設 1
    function readNumber(str, i) {
        let num = '';
        while (i < str.length && /[0-9]/.test(str[i])) {
            num += str[i++];
        }
        return [num ? parseInt(num, 10) : 1, i];
    }

    function parseSegment(str, i = 0, stopChar = null) {
        const out = [];
        while (i < str.length) {
            const ch = str[i];

            if (stopChar && ch === stopChar) break;

            // 分隔符號：混合物加號、點號(例如水合物)、逗號等 → 略過
            if (ch === '+' || ch === '·' || ch === '.' || ch === ',') { i++; continue; }

            // 括號群組 (OH)2
            if (ch === '(') {
                const [inner, nextI] = parseSegment(str, i + 1, ')');
                i = nextI + 1; // 跳過 ')'
                const [mult, afterMult] = readNumber(str, i);
                i = afterMult;
                for (let k = 0; k < mult; k++) out.push(...inner);
                continue;
            }

            // 元素符號：大寫 + 可選小寫 (Na / Cl / Fe ...)
            if (/[A-Z]/.test(ch)) {
                let symbol = ch;
                i++;

                if (i < str.length && /[a-z]/.test(str[i])) {
                    symbol += str[i];
                    i++;
                }

                // 讀取一般數字倍數
                let [count, afterNum] = readNumber(str, i);

                // 若沒有數字倍數，且後面接的是小寫字母(不是下一個元素的大寫)，視為變數係數(CxHy...) → 吃掉變數並將 count 視為 1
                if (count === 1 && afterNum === i && i < str.length && /[a-z]/.test(str[i])) {
                    while (i < str.length && /[a-z]/.test(str[i])) i++;
                    afterNum = i;
                    count = 1;
                } else {
                    i = afterNum;
                }

                for (let k = 0; k < count; k++) out.push(symbol);
                continue;
            }

            // 其他字元(例如箭頭、電荷符號等) → 略過
            i++;
        }
        return [out, i];
    }

    return parseSegment(f, 0, null)[0];
}
